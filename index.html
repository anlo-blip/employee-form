<!DOCTYPE html>
<html lang="ar">
<body>

<h2>اختبار رفع ملف</h2>

<input id="employeeName" placeholder="اسم الموظف"><br><br>
<input type="file" id="file"><br><br>

<button onclick="submitForm()">إرسال</button>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzCeoZjofQepyEXVwld-sxXPhKZKSdsbXm412fBdSNeOThs_eEh5KJ_FnDdjj_kRFt38w/exec";

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      resolve(reader.result.split(',')[1]);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function submitForm() {

  const name = document.getElementById("employeeName").value;
  const file = document.getElementById("file").files[0];

  if (!name) {
    alert("اسم الموظف مطلوب");
    return;
  }

  if (!file) {
    alert("ارفع ملف");
    return;
  }

  const base64 = await fileToBase64(file);

  const formData = new FormData();
  formData.append("employeeName", name);
  formData.append("coursesCount", "1");

  formData.append("courses[0][courseName]", "اختبار");
  formData.append("courses[0][programType]", "برنامج تدريبي");
  formData.append("courses[0][field]", "تقني");
  formData.append("courses[0][date]", "2026-03-26");
  formData.append("courses[0][duration]", "1 – 3 أيام");
  formData.append("courses[0][location]", "داخل المملكة");
  formData.append("courses[0][deliveryMode]", "حضوري");
  formData.append("courses[0][provider]", "اختبار");
  formData.append("courses[0][relevance]", "مرتبط بشكل مباشر");
  formData.append("courses[0][hrProvided]", "لا");

  formData.append("courses[0][fileBase64]", base64);
  formData.append("courses[0][fileName]", file.name);
  formData.append("courses[0][fileMimeType]", file.type);

  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    body: formData
  });

  const result = await res.json();
  alert(JSON.stringify(result));
}
</script>

</body>
</html>
